- hosts: web
  become: yes

  tasks:

    - name: Ensure nginx installed
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create homepage
      copy:
        dest: /var/www/html/index.html
        content: "Ghost Drift Demo Healthy"

    - name: Ensure nginx running
      service:
        name: nginx
        state: started
        enabled: yes
